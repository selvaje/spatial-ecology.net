name: Copy Sphinx Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  copy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spatial-ecology.net
        uses: actions/checkout@v4

      - name: Checkout SE_docs
        uses: actions/checkout@v4
        with:
          repository: selvaje/SE_docs
          path: SE_docs_repo

      - name: Copy built HTML docs into docs/ folder
        run: |
          mkdir -p docs/build/html
          cp -r SE_docs_repo/build/html/. docs/build/html/

          # Rename _static → static so Jekyll does not strip underscore dirs
          if [ -d docs/build/html/_static ]; then
            mv docs/build/html/_static docs/build/html/static
          fi

          # Rename _sources → sources so Jekyll does not strip underscore dirs
          if [ -d docs/build/html/_sources ]; then
            mv docs/build/html/_sources docs/build/html/sources
          fi

          # Fix all HTML references: _static/ → static/ and _sources/ → sources/
          find docs/build/html -name "*.html" -exec sed -i 's|_static/|static/|g; s|_sources/|sources/|g' {} +

          # Fix any JS files that also reference _static/
          find docs/build/html -name "*.js" -exec sed -i 's|_static/|static/|g' {} +

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update Sphinx docs from SE_docs"
          git push
	  
